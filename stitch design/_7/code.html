<!DOCTYPE html>

<html class="" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">expand_more</span>
</button>
<div class="text-center">
<p class="text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400">正在播放</p>
<p class="text-sm font-medium text-primary">来自 每日精选 1</p>
</div>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</header>
<!-- Main Content Area (Player) -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-12">
<!-- Album Art Container -->
<div class="w-full max-w-sm aspect-square relative group">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full -z-10 opacity-50"></div>
<div class="w-full h-full rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 bg-slate-200 dark:bg-slate-800">
<img alt="专辑封面" class="w-full h-full object-cover" data-alt="Modern abstract neon colorful album art cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrYnflaqr_1c1kssSRVzCK3SfKtE9B633IA1ZoARWkSKZga-lGV1A6HxWqEfREiL_KTHE5yyyHPo6rd3JTFNq8cq0_w5dYiao6GKzZ00SkmmjUe7pkFWFG8-MBErvGPiDuo3IaktGKtVLB7x0TBf5fSczlLsVK8F1iUya4Sl3cUiRIs8hRP8w3FxHM3h83hIIer6rRbVwouJfpdi0848alevfsxoDN6ezcQ4Gitvm-cu01V74zEmtpJ4ja3iivPLhP9wwnbq0Oi7M"/>
</div>
</div>
<!-- Song Info -->
<div class="mt-10 text-center">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">午夜之城</h1>
<p class="mt-2 text-lg text-slate-600 dark:text-slate-400 font-medium">合成器波团体</p>
</div>
<!-- Tags -->
<div class="mt-6 flex flex-wrap justify-center gap-2">
<span class="px-4 py-1.5 bg-primary/10 dark:bg-primary/20 text-primary rounded-full text-xs font-semibold border border-primary/20">#专注</span>
<span class="px-4 py-1.5 bg-primary/10 dark:bg-primary/20 text-primary rounded-full text-xs font-semibold border border-primary/20">#低保真</span>
<span class="px-4 py-1.5 bg-primary/10 dark:bg-primary/20 text-primary rounded-full text-xs font-semibold border border-primary/20">#放松</span>
<button class="flex items-center justify-center size-8 rounded-full bg-slate-200 dark:bg-slate-800 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<!-- Progress Bar -->
<div class="w-full max-w-md mt-10">
<div class="relative w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-2/3 bg-primary rounded-full"></div>
</div>
<div class="flex justify-between mt-3">
<span class="text-xs font-medium text-slate-500 dark:text-slate-500 tracking-tighter">2:14</span>
<span class="text-xs font-medium text-slate-500 dark:text-slate-500 tracking-tighter">3:45</span>
</div>
</div>
<!-- Controls -->
<div class="w-full max-w-md mt-8 flex items-center justify-between">
<button class="text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<div class="flex items-center gap-8">
<button class="text-slate-900 dark:text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined text-4xl fill">skip_previous</span>
</button>
<button class="size-20 flex items-center justify-center rounded-full bg-primary text-white shadow-lg shadow-primary/40 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl fill">pause</span>
</button>
<button class="text-slate-900 dark:text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined text-4xl fill">skip_next</span>
</button>
</div>
<button class="text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">queue_music</span>
</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 px-4 py-2 pb-6">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">queue_music</span>
<span class="text-[10px] font-medium">歌单</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">sell</span>
<span class="text-[10px] font-medium">标签</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">tune</span>
<span class="text-[10px] font-medium">筛选</span>
</a>
</div>
</nav>
</div>
</body></html>
